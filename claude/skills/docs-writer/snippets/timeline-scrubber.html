<!-- snippet:timeline-scrubber
     Horizontal timeline with theme filter. Used on changelog.html to show
     78 commits across the v0.0.1 development window. Click any commit dot
     to expand details. Filter by theme color.

     Data is read from a JSON script embedded inline. To customize the
     timeline for a different page, modify the inline JSON.

     Placeholder usage:
       <div data-snippet="timeline-scrubber"></div>
-->
<div class="pkit-timeline" data-snippet-mount="timeline-scrubber">
  <style>
    .pkit-timeline { margin: 1.5rem 0; padding: 1.5rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); }
    .pkit-timeline .pkit-tl-controls { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .pkit-timeline .pkit-tl-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-subtle); font-weight: 600; }
    .pkit-timeline .pkit-tl-filter { padding: 0.3rem 0.65rem; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--fg-muted); font-size: 0.78rem; cursor: pointer; transition: all var(--transition); display: inline-flex; align-items: center; gap: 0.35rem; }
    .pkit-timeline .pkit-tl-filter .dot { width: 8px; height: 8px; border-radius: 50%; }
    .pkit-timeline .pkit-tl-filter:hover { color: var(--fg); border-color: var(--border-strong); }
    .pkit-timeline .pkit-tl-filter.active { color: var(--fg); border-color: var(--accent); background: var(--accent-soft); }
    .pkit-timeline .pkit-tl-track {
      position: relative;
      height: 80px;
      background: linear-gradient(to right, var(--border) 0%, var(--border) 100%);
      background-repeat: no-repeat;
      background-size: 100% 2px;
      background-position: center;
      margin: 1.5rem 0;
      overflow-x: auto;
      padding: 30px 12px;
    }
    .pkit-timeline .pkit-tl-dot {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 150ms ease;
      border: 2px solid var(--bg-elev);
      box-shadow: 0 0 0 1px var(--border-strong);
    }
    .pkit-timeline .pkit-tl-dot:hover {
      transform: translate(-50%, -50%) scale(1.6);
      z-index: 10;
    }
    .pkit-timeline .pkit-tl-dot.dimmed { opacity: 0.15; pointer-events: none; }
    .pkit-timeline .pkit-tl-dot.selected { transform: translate(-50%, -50%) scale(1.8); z-index: 11; box-shadow: 0 0 0 3px var(--accent); }
    .pkit-timeline .pkit-tl-axis-label {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--fg-subtle);
      padding: 0.4rem 0 0;
    }
    .pkit-timeline .pkit-tl-detail {
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 1rem;
      min-height: 80px;
      font-size: 0.88rem;
      color: var(--fg);
    }
    .pkit-timeline .pkit-tl-detail .empty { color: var(--fg-subtle); font-style: italic; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.4rem; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-pr { font-family: var(--mono); font-size: 0.85rem; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-pr a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-pr a:hover { text-decoration: underline; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-theme { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.1rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg-muted); }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-theme .dot { width: 8px; height: 8px; border-radius: 50%; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-title { font-weight: 600; line-height: 1.4; }
    .pkit-timeline .pkit-tl-detail .pkit-tl-d-date { font-family: var(--mono); font-size: 0.78rem; color: var(--fg-muted); }
    .pkit-timeline .pkit-tl-stats { display: flex; gap: 1rem; font-size: 0.78rem; color: var(--fg-muted); margin-top: 0.6rem; }
    .pkit-timeline .pkit-tl-stats .stat strong { color: var(--accent); font-family: var(--mono); }
  </style>

<script>
(function() {
  'use strict';
  document.querySelectorAll('.pkit-timeline[data-snippet-mount="timeline-scrubber"]').forEach(tl => {
  if (tl.dataset.pkitInit) return;
  tl.dataset.pkitInit = '1';

  const dataEl = tl.querySelector('script[data-tl-data]');
  if (!dataEl) return;
  const data = JSON.parse(dataEl.textContent);
  const themesById = Object.fromEntries(data.themes.map(t => [t.id, t]));
  const track = tl.querySelector('[data-tl-track]');
  const filtersEl = tl.querySelector('[data-tl-filters]');
  const detail = tl.querySelector('[data-tl-detail]');
  const stats = tl.querySelector('[data-tl-stats]');
  if (!track || !filtersEl || !detail || !stats) return;

  const minPR = Math.min(...data.items.map(i => i.pr));
  const maxPR = Math.max(...data.items.map(i => i.pr));
  const range = maxPR - minPR || 1;

  // Build filter buttons
  let label = document.createElement('span');
  label.className = 'pkit-tl-label';
  label.textContent = 'Filter theme:';
  filtersEl.appendChild(label);

  const allBtn = document.createElement('button');
  allBtn.className = 'pkit-tl-filter active';
  allBtn.dataset.theme = 'all';
  allBtn.innerHTML = '<span class="dot" style="background:#94a3b8"></span>All';
  filtersEl.appendChild(allBtn);

  data.themes.forEach(t => {
    const b = document.createElement('button');
    b.className = 'pkit-tl-filter';
    b.dataset.theme = t.id;
    b.innerHTML = `<span class="dot" style="background:${t.color}"></span>${t.label}`;
    filtersEl.appendChild(b);
  });

  // Build dots
  data.items.forEach(item => {
    const dot = document.createElement('button');
    dot.className = 'pkit-tl-dot';
    dot.dataset.theme = item.theme;
    dot.dataset.pr = item.pr;
    const left = ((item.pr - minPR) / range) * 100;
    dot.style.left = left + '%';
    dot.style.background = themesById[item.theme].color;
    dot.title = `PR #${item.pr}: ${item.title}`;
    dot.addEventListener('click', () => showDetail(item));
    track.appendChild(dot);
  });

  const axis = document.createElement('div');
  axis.className = 'pkit-tl-axis-label';
  axis.innerHTML = `<span>PR #${minPR}</span><span>PR #${Math.round((minPR + maxPR) / 2)}</span><span>PR #${maxPR}</span>`;
  track.appendChild(axis);

  function showDetail(item) {
    const theme = themesById[item.theme];
    detail.innerHTML = `
      <div class="pkit-tl-d-header">
        <span class="pkit-tl-d-pr"><a href="https://github.com/Bruce188/pipelinekit/pull/${item.pr}" target="_blank">PR #${item.pr}</a></span>
        <span class="pkit-tl-d-theme"><span class="dot" style="background:${theme.color}"></span>${theme.label}</span>
      </div>
      <div class="pkit-tl-d-title">${item.title}</div>
    `;
    tl.querySelectorAll('.pkit-tl-dot').forEach(d => d.classList.remove('selected'));
    const sel = tl.querySelector(`.pkit-tl-dot[data-pr="${item.pr}"]`);
    if (sel) sel.classList.add('selected');
  }

  function updateStats(theme) {
    const visible = data.items.filter(i => theme === 'all' || i.theme === theme);
    stats.innerHTML = `
      <span class="stat"><strong>${visible.length}</strong> commits shown</span>
      <span class="stat">PR range <strong>#${visible[0]?.pr ?? '?'}</strong> → <strong>#${visible[visible.length - 1]?.pr ?? '?'}</strong></span>
    `;
  }

  // Filter wiring
  filtersEl.querySelectorAll('.pkit-tl-filter').forEach(btn => {
    btn.addEventListener('click', () => {
      filtersEl.querySelectorAll('.pkit-tl-filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const want = btn.dataset.theme;
      tl.querySelectorAll('.pkit-tl-dot').forEach(d => {
        if (want === 'all' || d.dataset.theme === want) d.classList.remove('dimmed');
        else d.classList.add('dimmed');
      });
      updateStats(want);
    });
  });

  updateStats('all');
  });
})();
</script>
