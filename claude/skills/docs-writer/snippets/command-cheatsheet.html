<!-- usage: <div data-snippet="command-cheatsheet"></div> -->
<div class="pkit-cmd" data-snippet-mount="command-cheatsheet">
  <style>
    .pkit-cmd { margin: 1.5rem 0; }
    .pkit-cmd .pkit-cmd-toolbar { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.8rem; }
    .pkit-cmd .pkit-cmd-filter { flex: 1; padding: 0.4rem 0.7rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--fg); font-family: var(--sans); font-size: 0.88rem; }
    .pkit-cmd .pkit-cmd-filter:focus { outline: none; border-color: var(--accent); }
    .pkit-cmd .pkit-cmd-count { font-family: var(--mono); font-size: 0.75rem; color: var(--fg-muted); white-space: nowrap; }
    .pkit-cmd .pkit-cmd-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
    .pkit-cmd .pkit-cmd-table { width: 100%; border-collapse: collapse; font-family: var(--sans); font-size: 0.85rem; }
    .pkit-cmd .pkit-cmd-table thead tr { background: var(--bg-elev); }
    .pkit-cmd .pkit-cmd-table th { padding: 0.55rem 0.9rem; text-align: left; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--fg-subtle); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-elev); z-index: 1; white-space: nowrap; }
    .pkit-cmd .pkit-cmd-table td { padding: 0.5rem 0.9rem; border-bottom: 1px solid var(--border); color: var(--fg); vertical-align: top; }
    .pkit-cmd .pkit-cmd-table tbody tr:last-child td { border-bottom: none; }
    .pkit-cmd .pkit-cmd-table tbody tr:hover td { background: var(--accent-soft); }
    .pkit-cmd .pkit-cmd-table .pkit-cmd-name { font-family: var(--mono); font-weight: 700; white-space: nowrap; color: var(--accent); }
    .pkit-cmd .pkit-cmd-table .pkit-cmd-args { font-family: var(--mono); font-size: 0.78rem; color: var(--fg-muted); white-space: nowrap; }
    .pkit-cmd .pkit-cmd-table .pkit-cmd-desc { max-width: 400px; line-height: 1.45; }
    .pkit-cmd .pkit-cmd-empty { padding: 1.5rem; text-align: center; color: var(--fg-subtle); font-style: italic; }
  </style>

  <div class="pkit-cmd-toolbar">
    <input type="search" class="pkit-cmd-filter" placeholder="Filter commands…" aria-label="Filter slash commands">
    <span class="pkit-cmd-count" data-cmd-count></span>
  </div>
  <div class="pkit-cmd-wrap">
    <table class="pkit-cmd-table" aria-label="pipelinekit slash commands">
      <thead>
        <tr>
          <th>Command</th>
          <th>Args</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody data-cmd-tbody></tbody>
    </table>
    <div class="pkit-cmd-empty" data-cmd-empty style="display:none">No commands match your filter.</div>
  </div>

  <script type="application/json" id="cmd-data">
[
  {"name":"/analyze","args":"(none)","default":"(none)","description":"Analyze an existing codebase or defined task. Asks 2 focused questions, then produces docs/analysis.md."},
  {"name":"/ascii-diagram","args":"(none)","default":"(none)","description":"Generate an ASCII architecture diagram for the current project or a described system."},
  {"name":"/azure-ops","args":"(none)","default":"(none)","description":"Azure CLI wrapper for common ops — resource listing, deploy (App Service / Container Apps / Function Apps), log tail."},

  {"name":"/caveman-mode","args":"(none)","default":"wenyan-ultra","description":"Toggle response verbosity (caveman-style terse fragments vs normal English)."},
  {"name":"/code-health","args":"[--scope] [--quick] [--threshold]","default":"full scan","description":"Comprehensive codebase health assessment with quality metrics, test coverage, documentation, and maintainability."},

  {"name":"/dependency-auditor","args":"(none)","default":"(none)","description":"Check dependencies for known vulnerabilities using npm audit, pip-audit, etc."},
  {"name":"/deploy-target","args":"<provider>","default":"(none)","description":"Set the active session deployment target (vercel, railway, render, digitalocean, or none)."},
  {"name":"/digitalocean-ops","args":"(none)","default":"(none)","description":"Deploy and verify DigitalOcean App Platform apps when the charter targets digitalocean."},
  {"name":"/docs-writer","args":"(none)","default":"(none)","description":"Documentation skill — renders markdown to rich, interactive, self-contained HTML for documentation/."},

  {"name":"/dotnet-conventions","args":"(none)","default":"(none)","description":".NET architecture, DI, data access, and testing conventions. Loaded for C#/.NET files."},

  {"name":"/simplify","args":"(none)","default":"(none)","description":"Post-green reductive refactor: remove unused helpers, dead branches, over-generalized abstractions."},
  {"name":"/test-hooks","args":"(none)","default":"(none)","description":"Run hook tests and summarize results. Auto-loads when working on files under .claude/hooks/."},
  {"name":"/vercel-ops","args":"(none)","default":"(none)","description":"Vercel CLI wrapper for common ops — project listing, deploy (preview / production), log tail."}
]
  </script>
</div>

<script>
(function() {
  'use strict';
  document.querySelectorAll('.pkit-cmd[data-snippet-mount="command-cheatsheet"]').forEach(function(root) {
    if (root.dataset.pkitInit) return;
    root.dataset.pkitInit = '1';

    var filterEl = root.querySelector('.pkit-cmd-filter');
    var tbody = root.querySelector('[data-cmd-tbody]');
    var countEl = root.querySelector('[data-cmd-count]');
    var emptyEl = root.querySelector('[data-cmd-empty]');
    var dataEl = root.querySelector('#cmd-data');
    if (!dataEl || !tbody) return;

    var commands = JSON.parse(dataEl.textContent);
    var rows = [];
    var debounceTimer = null;

    commands.forEach(function(cmd) {
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="pkit-cmd-name">' + cmd.name + '</td>' +
        '<td class="pkit-cmd-args">' + (cmd.args || '(none)') + '</td>' +
        '<td class="pkit-cmd-desc">' + cmd.description + '</td>';
      tr.dataset.searchText = (cmd.name + ' ' + (cmd.args || '') + ' ' + cmd.description).toLowerCase();
      tbody.appendChild(tr);
      rows.push(tr);
    });

    function updateCount(visible) {
      if (countEl) countEl.textContent = visible + ' / ' + rows.length;
    }

    function applyFilter(q) {
      var lq = q.toLowerCase();
      var visible = 0;
      rows.forEach(function(tr) {
        var show = !lq || tr.dataset.searchText.indexOf(lq) !== -1;
        tr.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      if (emptyEl) emptyEl.style.display = visible === 0 ? 'block' : 'none';
      updateCount(visible);
    }

    filterEl && filterEl.addEventListener('input', function() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        applyFilter(filterEl.value);
      }, 120);
    });

    applyFilter('');
  });
})();
</script>
