<!-- usage:
     <div data-snippet="before-after-slider">
       <div data-bas-before><!-- arbitrary markup --></div>
       <div data-bas-after><!-- arbitrary markup --></div>
     </div>
-->
<div class="pkit-bas" data-snippet-mount="before-after-slider">
  <style>
    .pkit-bas { margin: 1.5rem 0; }
    .pkit-bas .pkit-bas-viewport {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elev);
      min-height: 120px;
      user-select: none;
    }
    .pkit-bas .pkit-bas-layer {
      position: absolute;
      inset: 0;
      padding: 1rem;
      overflow: hidden;
    }
    .pkit-bas .pkit-bas-layer--before {
      background: var(--bg-elev);
      z-index: 1;
    }
    .pkit-bas .pkit-bas-layer--after {
      background: var(--bg);
      z-index: 2;
      clip-path: inset(0 var(--pkit-bas-clip, 50%) 0 0);
      transition: clip-path 60ms linear;
    }
    .pkit-bas .pkit-bas-handle {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      z-index: 3;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      transition: left 60ms linear;
    }
    .pkit-bas .pkit-bas-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .pkit-bas .pkit-bas-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.3rem;
      font-family: var(--sans);
      font-size: 0.75rem;
      color: var(--fg-subtle);
    }
    .pkit-bas .pkit-bas-range {
      width: 100%;
      margin-top: 0.6rem;
      accent-color: var(--accent);
    }
    @media (prefers-reduced-motion: reduce) {
      .pkit-bas * { transition: none !important; animation: none !important; }
    }
  </style>

  <div class="pkit-bas__viewport">
    <div class="pkit-bas__layer pkit-bas__layer--before"></div>
    <div class="pkit-bas__layer pkit-bas__layer--after" style="--pkit-bas-clip: 50%"></div>
    <div class="pkit-bas__handle" aria-hidden="true"></div>
  </div>
  <div class="pkit-bas-labels">
    <span>Before</span>
    <span>After</span>
  </div>
  <input type="range" class="pkit-bas__range" min="0" max="100" value="50"
         aria-label="Reveal slider — drag to compare before and after">
</div>

<script>
(function() {
  'use strict';
  document.querySelectorAll('.pkit-bas[data-snippet-mount="before-after-slider"]').forEach(function(root) {
    if (root.dataset.pkitInit) return;
    root.dataset.pkitInit = '1';

    var beforeChild = root.querySelector('[data-bas-before]');
    var afterChild  = root.querySelector('[data-bas-after]');
    var layerBefore = root.querySelector('.pkit-bas__layer--before');
    var layerAfter  = root.querySelector('.pkit-bas__layer--after');
    var handle      = root.querySelector('.pkit-bas__handle');
    var rangeInput  = root.querySelector('.pkit-bas__range');

    if (beforeChild && layerBefore) {
      layerBefore.innerHTML = beforeChild.innerHTML;
      beforeChild.style.display = 'none';
    }
    if (afterChild && layerAfter) {
      layerAfter.innerHTML = afterChild.innerHTML;
      afterChild.style.display = 'none';
    }

    function applyValue(val) {
      var pct = Math.min(100, Math.max(0, parseInt(val, 10)));
      var clipRight = (100 - pct) + '%';
      if (layerAfter) layerAfter.style.setProperty('--pkit-bas-clip', clipRight);
      if (handle) handle.style.left = pct + '%';
    }

    rangeInput && rangeInput.addEventListener('input', function() {
      applyValue(rangeInput.value);
    });

    applyValue(rangeInput ? rangeInput.value : 50);
  });
})();
</script>
