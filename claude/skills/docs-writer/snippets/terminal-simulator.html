<!-- snippet:terminal-simulator
     Simulated terminal session. Plays back a scripted sequence of
     commands + outputs at a configurable speed. Pause / play / step /
     restart controls. Used on ppr-research-flag.html for a dry-run
     preview without requiring the user to actually run /ppr --research.

     The scripted session is JSON-embedded inline. Lines are typed
     character-by-character for commands; output is dumped instantly.

     Placeholder usage:
       <div data-snippet="terminal-simulator"></div>
-->
<div class="pkit-term" data-snippet-mount="terminal-simulator">
  <style>
    .pkit-term { margin: 1.5rem 0; padding: 0; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .pkit-term .pkit-tm-bar { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.8rem; background: var(--bg); border-bottom: 1px solid var(--border); }
    .pkit-term .pkit-tm-dots { display: flex; gap: 0.4rem; }
    .pkit-term .pkit-tm-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--fg-subtle); opacity: 0.7; }
    .pkit-term .pkit-tm-dot:nth-child(1) { background: #ef4444; }
    .pkit-term .pkit-tm-dot:nth-child(2) { background: #f59e0b; }
    .pkit-term .pkit-tm-dot:nth-child(3) { background: #10b981; }
    .pkit-term .pkit-tm-title { font-family: var(--mono); font-size: 0.78rem; color: var(--fg-muted); }
    .pkit-term .pkit-tm-controls { display: flex; gap: 0.3rem; }
    .pkit-term .pkit-tm-btn { padding: 0.2rem 0.6rem; background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--fg-muted); font-family: var(--sans); font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 0.25rem; transition: all var(--transition); }
    .pkit-term .pkit-tm-btn:hover { color: var(--fg); border-color: var(--accent); }
    .pkit-term .pkit-tm-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pkit-term .pkit-tm-btn.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    .pkit-term .pkit-tm-screen { background: #0a0e1a; color: #d4d7e0; font-family: var(--mono); font-size: 13px; line-height: 1.55; padding: 1rem 1.2rem; min-height: 280px; max-height: 480px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .pkit-term .pkit-tm-screen .ps1 { color: #4ade80; }
    .pkit-term .pkit-tm-screen .cmd { color: #fbbf24; }
    .pkit-term .pkit-tm-screen .out-stdout { color: #cbd5e1; }
    .pkit-term .pkit-tm-screen .out-stderr { color: #fb7185; }
    .pkit-term .pkit-tm-screen .out-info { color: #60a5fa; }
    .pkit-term .pkit-tm-screen .out-success { color: #34d399; font-weight: 600; }
    .pkit-term .pkit-tm-screen .cursor { display: inline-block; width: 8px; height: 1em; background: #d4d7e0; vertical-align: text-bottom; animation: pkit-tm-blink 1s steps(2) infinite; }
    @keyframes pkit-tm-blink { 50% { opacity: 0; } }
    .pkit-term .pkit-tm-progress { height: 2px; background: var(--border); }
    .pkit-term .pkit-tm-progress-fill { height: 100%; background: var(--accent); transition: width 100ms linear; width: 0; }
  </style>

  <div class="pkit-tm-bar">
    <div class="pkit-tm-dots">
      <span class="pkit-tm-dot"></span><span class="pkit-tm-dot"></span><span class="pkit-tm-dot"></span>
    </div>
    <div class="pkit-tm-title">/ppr --research — simulated</div>
    <div class="pkit-tm-controls">
      <button class="pkit-tm-btn" data-act="play">▶ Play</button>
      <button class="pkit-tm-btn" data-act="pause" disabled>⏸ Pause</button>
      <button class="pkit-tm-btn" data-act="step">⏭ Step</button>
      <button class="pkit-tm-btn" data-act="restart">↻ Restart</button>
      <button class="pkit-tm-btn" data-act="speed">1×</button>
    </div>
  </div>
  <div class="pkit-tm-progress"><div class="pkit-tm-progress-fill" data-tm-progress></div></div>
  <pre class="pkit-tm-screen" data-tm-screen></pre>

  <script type="application/json" data-tm-script>
[
  {"type": "ps1", "text": "$ "},
  {"type": "cmd", "text": "claude\n"},
  {"type": "out-info", "text": "Claude Code 2.1.144  (interactive)\n"},
  {"type": "pause", "ms": 400},
  {"type": "ps1", "text": "> "},
  {"type": "cmd", "text": "/ppr --research\n"},
  {"type": "out-info", "text": "[ppr] --research mode active. Default: --dry-run.\n"},
  {"type": "out-info", "text": "[ppr] Reading docs/research-results.tsv...\n"},
  {"type": "pause", "ms": 400},
  {"type": "out-stdout", "text": "[ppr] Found 12 keep-rows in TSV.\n"},
  {"type": "out-stdout", "text": "[ppr] Branch name would be: research/temp-2026-05-19\n"},
  {"type": "pause", "ms": 300},
  {"type": "out-stdout", "text": "[ppr] Planned actions (dry-run):\n"},
  {"type": "out-stdout", "text": "         git checkout -b research/temp-2026-05-19\n"},
  {"type": "out-stdout", "text": "         (filter 12 keep-rows from research-results.tsv into research-keep.tsv)\n"},
  {"type": "out-stdout", "text": "         git add research-keep.tsv\n"},
  {"type": "out-stdout", "text": "         git commit -m 'chore: publish research keeps for temp (12 rows)'\n"},
  {"type": "out-stdout", "text": "         git push -u origin research/temp-2026-05-19\n"},
  {"type": "pause", "ms": 500},
  {"type": "out-info", "text": "[ppr] No PR opened — research branches are user-reviewed before merge.\n"},
  {"type": "out-success", "text": "[ppr] OK. Dry-run complete. Pass --no-dry-run --research-tag <slug> to publish.\n"},
  {"type": "pause", "ms": 400},
  {"type": "ps1", "text": "> "},
  {"type": "cmd", "text": "/ppr --research --no-dry-run --research-tag temp\n"},
  {"type": "out-info", "text": "[ppr] --no-dry-run + --research-tag=temp. Publishing.\n"},
  {"type": "pause", "ms": 300},
  {"type": "out-stdout", "text": "[ppr] Creating branch research/temp-2026-05-19...\n"},
  {"type": "out-stdout", "text": "Switched to a new branch 'research/temp-2026-05-19'\n"},
  {"type": "out-stdout", "text": "[ppr] Filtering 12 keep-rows...\n"},
  {"type": "out-stdout", "text": "[ppr] Committing...\n"},
  {"type": "out-stdout", "text": "[ppr] Pushing to origin...\n"},
  {"type": "pause", "ms": 600},
  {"type": "out-success", "text": "[ppr] OK. Branch research/temp-2026-05-19 published.\n"},
  {"type": "out-success", "text": "[ppr] URL: https://github.com/Bruce188/pipelinekit/tree/research/temp-2026-05-19\n"},
  {"type": "out-info", "text": "[ppr] Review the branch and decide whether to merge.\n"}
]
  </script>
</div>

<script>
(function() {
  'use strict';
  document.querySelectorAll('.pkit-term[data-snippet-mount="terminal-simulator"]').forEach(term => {
  if (term.dataset.pkitInit) return;
  term.dataset.pkitInit = '1';

  const dataEl = term.querySelector('script[data-tm-script]');
  if (!dataEl) return;
  const script = JSON.parse(dataEl.textContent);
  const screen = term.querySelector('[data-tm-screen]');
  const progressFill = term.querySelector('[data-tm-progress]');
  const playBtn = term.querySelector('[data-act="play"]');
  const pauseBtn = term.querySelector('[data-act="pause"]');
  const stepBtn = term.querySelector('[data-act="step"]');
  const restartBtn = term.querySelector('[data-act="restart"]');
  const speedBtn = term.querySelector('[data-act="speed"]');
  if (!screen || !progressFill || !playBtn) return;

  let idx = 0;
  let playing = false;
  let abort = false;
  let speed = 1;
  const speeds = [1, 2, 4, 0.5];
  const cursor = '<span class="cursor"></span>';

  function sleep(ms) { return new Promise(r => setTimeout(r, ms / speed)); }

  function escape(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function appendChunk(item) {
    const html = `<span class="${item.type}">${escape(item.text)}</span>`;
    if (screen.querySelector('.cursor')) {
      screen.querySelector('.cursor').remove();
    }
    screen.insertAdjacentHTML('beforeend', html);
    screen.insertAdjacentHTML('beforeend', cursor);
    screen.scrollTop = screen.scrollHeight;
  }

  async function typeChunk(item) {
    if (item.type === 'cmd') {
      // Type char by char
      if (screen.querySelector('.cursor')) screen.querySelector('.cursor').remove();
      const span = document.createElement('span');
      span.className = 'cmd';
      screen.appendChild(span);
      for (const ch of item.text) {
        if (abort) return;
        span.textContent += ch;
        screen.scrollTop = screen.scrollHeight;
        await sleep(40);
      }
      screen.insertAdjacentHTML('beforeend', cursor);
    } else if (item.type === 'pause') {
      await sleep(item.ms || 200);
    } else {
      appendChunk(item);
      await sleep(60);
    }
  }

  function setPlaying(p) {
    playing = p;
    playBtn.classList.toggle('active', p);
    pauseBtn.disabled = !p;
    playBtn.disabled = p;
  }

  async function play() {
    setPlaying(true);
    abort = false;
    while (idx < script.length && playing && !abort) {
      const item = script[idx];
      idx++;
      progressFill.style.width = (idx / script.length * 100) + '%';
      await typeChunk(item);
    }
    if (idx >= script.length) setPlaying(false);
  }

  playBtn.addEventListener('click', () => { if (!playing) play(); });
  pauseBtn.addEventListener('click', () => { setPlaying(false); abort = true; });
  stepBtn.addEventListener('click', async () => {
    if (idx >= script.length) return;
    const wasPlaying = playing; setPlaying(false); abort = true;
    await new Promise(r => setTimeout(r, 50));
    const item = script[idx]; idx++; progressFill.style.width = (idx / script.length * 100) + '%';
    await typeChunk(item);
    if (wasPlaying && idx < script.length) play();
  });
  restartBtn.addEventListener('click', () => {
    abort = true; setPlaying(false);
    idx = 0; screen.innerHTML = cursor; progressFill.style.width = '0';
  });
  speedBtn.addEventListener('click', () => {
    const i = (speeds.indexOf(speed) + 1) % speeds.length;
    speed = speeds[i];
    speedBtn.textContent = speed + '×';
  });

  screen.innerHTML = cursor;

  // Auto-play on first scroll-into-view (if IntersectionObserver available)
  if ('IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting && idx === 0 && !playing) {
          play();
          io.disconnect();
        }
      });
    }, { threshold: 0.4 });
    io.observe(term);
  }
  });
})();
</script>
